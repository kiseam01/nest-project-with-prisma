services:
  postgres:
    image: postgres:16
    container_name: auth_postgres
    restart: always
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: auth_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: